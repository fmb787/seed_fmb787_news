name: Fetch News

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python fetch_and_push.py
        env:
          GITHUB_TOKEN: ${{ secrets.NEWS_GITHUB_TOKEN }}
          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}
          JBLANKED_TOKEN: ${{ secrets.JBLANKED_TOKEN }}
